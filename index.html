<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login - Sistem Pelaporan Kerusakan Fasilitas Kampus</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="auth-logo">

            <h1>
                Sistem Pelaporan Kerusakan
            </h1>

            <p>
                Fasilitas Kampus
            </p>

        </div>

        <form id="loginForm">

            <div class="form-group">

                <label>
                    Email
                </label>

                <input
                    type="email"
                    id="email"
                    class="form-control"
                    placeholder="Masukkan email"
                    required>

            </div>

            <div class="form-group">

                <label>
                    Password
                </label>

                <input
                    type="password"
                    id="password"
                    class="form-control"
                    placeholder="Masukkan password"
                    required>

            </div>

            <button
                type="submit"
                class="btn">

                Login

            </button>

        </form>

        <div class="auth-footer">

            Belum memiliki akun?

            <a href="register.html">

                Daftar

            </a>

        </div>

        <hr style="margin:20px 0">

        <div style="font-size:14px;color:#64748B;">

            <strong>Akun Admin</strong>

            <br><br>

            Email :
            admin@kampus.com

            <br>

            Password :
            admin123

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
