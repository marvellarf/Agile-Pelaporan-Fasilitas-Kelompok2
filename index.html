<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Facility Report</title>

    <!-- Font Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="auth-page">

    <div class="auth-card">

        <div class="logo">

            <h1>Facility Report</h1>

            <p>
                Sistem Pelaporan Kerusakan
                Fasilitas Kampus
            </p>

        </div>

        <form id="loginForm">

            <div class="form-group">

                <label>Email</label>

                <input
                    type="email"
                    id="email"
                    class="form-control"
                    placeholder="Masukkan email"
                    required>

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    class="form-control"
                    placeholder="Masukkan password"
                    required>

            </div>

            <button type="submit"
                    class="btn">

                Login

            </button>

        </form>

        <div class="auth-footer">

            Belum punya akun?

            <a href="register.html">

                Register

            </a>

        </div>

        <hr style="margin:25px 0">

        <div style="font-size:14px">

            <strong>Akun Admin Demo</strong>

            <br><br>

            Email:
            admin@kampus.com

            <br>

            Password:
            admin123

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
