<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Buat Laporan</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div class="dashboard">

    <aside class="sidebar">

        <div class="logo-sidebar">

            <h2>
                Facility Report
            </h2>

        </div>

        <div class="sidebar-menu">

            <a href="dashboard-pelapor.html">

                Dashboard

            </a>

            <a href="buat-laporan.html"
               class="active">

                Buat Laporan

            </a>

            <a href="riwayat-laporan.html">

                Riwayat Laporan

            </a>

            <a href="profil.html">

                Profil

            </a>

            <a href="index.html">

                Logout

            </a>

        </div>

    </aside>

    <main class="main-content">

        <div class="header">

            <h1>
                Form Pelaporan Kerusakan
            </h1>

            <p>
                Lengkapi data kerusakan fasilitas kampus
            </p>

        </div>

        <div class="card">

            <form class="form-grid">

                <div>

                    <label>
                        Kategori Kerusakan
                    </label>

                    <select>

                        <option>AC</option>
                        <option>Listrik</option>
                        <option>Internet</option>
                        <option>Furniture</option>
                        <option>Bangunan</option>

                    </select>

                </div>

                <div>

                    <label>
                        Tingkat Urgensi
                    </label>

                    <select>

                        <option>Rendah</option>
                        <option>Sedang</option>
                        <option>Tinggi</option>

                    </select>

                </div>

                <div class="full">

                    <label>
                        Lokasi Kerusakan
                    </label>

                    <input
                        type="text"
                        placeholder="Contoh: Gedung A Lt.2 Ruang 204">

                </div>

                <div class="full">

                    <label>
                        Kronologi Kerusakan
                    </label>

                    <textarea
                        rows="6"
                        placeholder="Jelaskan kronologi kerusakan secara detail"></textarea>

                </div>

                <div class="full">

                    <label>
                        Upload Foto Bukti
                    </label>

                    <input
                        type="file"
                        id="foto"
                        accept="image/*">

                    <img
                        id="preview"
                        class="preview-image">

                </div>

                <div class="full">

                    <button
                        type="submit"
                        class="btn">

                        Kirim Laporan

                    </button>

                </div>

            </form>

        </div>

    </main>

</div>

<script>

const foto =
document.getElementById("foto");

const preview =
document.getElementById("preview");

foto.addEventListener(
"change",
function(){

const file =
this.files[0];

if(file){

preview.src =
URL.createObjectURL(file);

preview.style.display =
"block";

}

}
);

</script>

</body>
</html>
