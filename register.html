<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div class="auth-page">

    <div class="auth-card">

        <div class="logo">

            <h1>Register</h1>

            <p>
                Pendaftaran Pelapor
            </p>

        </div>

        <form id="registerForm">

            <div class="form-group">

                <label>Nama Lengkap</label>

                <input
                    type="text"
                    class="form-control"
                    required>

            </div>

            <div class="form-group">

                <label>NIM / NIP</label>

                <input
                    type="text"
                    class="form-control"
                    required>

            </div>

            <div class="form-group">

                <label>Email</label>

                <input
                    type="email"
                    class="form-control"
                    required>

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                    type="password"
                    class="form-control"
                    required>

            </div>

            <div class="form-group">

                <label>Konfirmasi Password</label>

                <input
                    type="password"
                    class="form-control"
                    required>

            </div>

            <button class="btn">

                Register

            </button>

        </form>

        <div class="auth-footer">

            Sudah punya akun?

            <a href="index.html">

                Login

            </a>

        </div>

    </div>

</div>

<script>

document
.getElementById("registerForm")
.addEventListener("submit",function(e){

    e.preventDefault();

    alert(
        "Registrasi berhasil!"
    );

    window.location.href =
    "index.html";

});

</script>

</body>
</html>
