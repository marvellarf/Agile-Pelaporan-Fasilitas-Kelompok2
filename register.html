<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Registrasi | Suara Kampus</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-card register-card">

        <div class="auth-logo">

            <img src="Logo.png"
                 class="login-logo"
                 alt="Logo Suara Kampus">

            <h1>

                Registrasi Akun

            </h1>

            <p>

                Sistem Pelaporan Kerusakan Fasilitas Kampus

            </p>

        </div>

        <form>

            <div class="register-grid">

                <div>

                    <label>Nama Lengkap</label>

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Masukkan nama lengkap"
                        required>

                </div>

                <div>

                    <label>NIM</label>

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Masukkan NIM"
                        required>

                </div>

                <div>

                    <label>Program Studi</label>

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Masukkan program studi"
                        required>

                </div>

                <div>

                    <label>Fakultas</label>

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Masukkan fakultas"
                        required>

                </div>

                <div>

                    <label>Email</label>

                    <input
                        type="email"
                        class="form-control"
                        placeholder="Masukkan email"
                        required>

                </div>

                <div>

                    <label>Nomor Telepon</label>

                    <input
                        type="text"
                        class="form-control"
                        placeholder="08xxxxxxxxxx"
                        required>

                </div>

                <div class="full-width">

                    <label>Alamat</label>

                    <textarea
                        rows="4"
                        class="form-control"
                        placeholder="Masukkan alamat lengkap"></textarea>

                </div>

                <div>

                    <label>Password</label>

                    <input
                        type="password"
                        class="form-control"
                        placeholder="Masukkan password"
                        required>

                </div>

                <div>

                    <label>Konfirmasi Password</label>

                    <input
                        type="password"
                        class="form-control"
                        placeholder="Ulangi password"
                        required>

                </div>

                <div class="full-width">

                    <button
                        type="submit"
                        class="btn">

                        Daftar

                    </button>

                </div>

            </div>

        </form>

        <div class="auth-footer">

            Sudah memiliki akun?

            <a href="index.html">

                Login

            </a>

        </div>

        <div class="login-footer">

            © 2026 Suara Kampus

        </div>

    </div>

</div>

</body>

</html>
