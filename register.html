<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register Pelapor</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="auth-logo">

            <h1>
                Registrasi Pelapor
            </h1>

            <p>
                Mahasiswa / Dosen / Staf
            </p>

        </div>

        <form id="registerForm">

            <div class="form-group">

                <label>
                    Nama Lengkap
                </label>

                <input
                    type="text"
                    class="form-control"
                    required>

            </div>

            <div class="form-group">

                <label>
                    NIM / NIP
                </label>

                <input
                    type="text"
                    class="form-control"
                    required>

            </div>

            <div class="form-group">

                <label>
                    Program Studi
                </label>

                <input
                    type="text"
                    class="form-control"
                    required>

            </div>

            <div class="form-group">

                <label>
                    Email
                </label>

                <input
                    type="email"
                    class="form-control"
                    required>

            </div>

            <div class="form-group">

                <label>
                    Password
                </label>

                <input
                    type="password"
                    class="form-control"
                    required>

            </div>

            <div class="form-group">

                <label>
                    Konfirmasi Password
                </label>

                <input
                    type="password"
                    class="form-control"
                    required>

            </div>

            <button
                class="btn">

                Daftar

            </button>

        </form>

        <div class="auth-footer">

            Sudah punya akun?

            <a href="index.html">

                Login

            </a>

        </div>

    </div>

</div>

<script>

document
.getElementById("registerForm")
.addEventListener("submit",function(e){

    e.preventDefault();

    alert(
        "Registrasi berhasil. Silakan login."
    );

    window.location.href =
    "index.html";

});

</script>

</body>
</html>
